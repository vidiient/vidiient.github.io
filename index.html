<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidiient — AI Real Estate Content Studio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green:#1a6b45;--green-l:#228a57;--glow:rgba(26,107,69,0.2);
    --dark:#080808;--dark2:#0f0f0f;--dark3:#161616;
    --border:rgba(26,107,69,0.25);--border-h:rgba(26,107,69,0.6);
    --text:#e0e0e0;--muted:#555;--white:#fff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--dark);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--green-l),transparent);z-index:100}
  body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(26,107,69,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(26,107,69,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
  .wrap{position:relative;z-index:1;max-width:400px;margin:0 auto;padding:56px 24px 72px;display:flex;flex-direction:column;align-items:center}

  /* Logo box */
  .logo-box{width:80px;height:80px;border-radius:18px;border:1px solid var(--border);background:var(--dark2);display:flex;align-items:center;justify-content:center;margin-bottom:16px;animation:up .5s ease both;transition:border-color .3s}
  .logo-box:hover{border-color:var(--border-h)}
  /* SVG logo recreation using Vidiient brand colors */
  .logo-svg{width:52px;height:52px}

  .brand{font-size:28px;font-weight:500;letter-spacing:3px;color:var(--white);margin-bottom:6px;animation:up .5s .08s ease both}
  .brand span{color:var(--green-l)}
  .tagline{font-size:11px;font-weight:300;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:6px;animation:up .5s .14s ease both;text-align:center}
  .loc{font-size:12px;color:var(--muted);margin-bottom:32px;animation:up .5s .18s ease both}
  .div{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin-bottom:28px;animation:up .5s .22s ease both}

  .links{width:100%;display:flex;flex-direction:column;gap:10px;margin-bottom:32px}
  .lnk{display:flex;align-items:center;gap:14px;padding:15px 18px;background:var(--dark2);border:1px solid rgba(255,255,255,0.06);border-radius:12px;text-decoration:none;color:var(--text);transition:all .22s;position:relative;overflow:hidden;animation:up .5s ease both}
  .lnk::after{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green-l);transform:scaleY(0);transition:transform .22s;border-radius:0 2px 2px 0}
  .lnk:hover{background:var(--dark3);border-color:var(--border-h);transform:translateX(5px)}
  .lnk:hover::after{transform:scaleY(1)}
  .lnk:nth-child(1){animation-delay:.28s}.lnk:nth-child(2){animation-delay:.35s}
  .lnk:nth-child(3){animation-delay:.42s}.lnk:nth-child(4){animation-delay:.49s}
  .ico{width:38px;height:38px;border-radius:9px;background:var(--glow);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px;transition:background .22s}
  .lnk:hover .ico{background:rgba(26,107,69,0.35)}
  .lt{flex:1}.lt-h{font-size:14px;font-weight:500;color:var(--white);margin-bottom:2px}.lt-s{font-size:11px;color:var(--muted)}
  .arr{color:var(--green-l);font-size:16px;opacity:.5;transition:opacity .2s,transform .2s}
  .lnk:hover .arr{opacity:1;transform:translateX(3px)}

  .socials{display:flex;gap:10px;margin-bottom:28px;animation:up .5s .56s ease both}
  .sb{width:38px;height:38px;border-radius:50%;border:1px solid rgba(255,255,255,0.08);background:var(--dark2);display:flex;align-items:center;justify-content:center;text-decoration:none;font-size:15px;transition:all .2s;color:var(--muted)}
  .sb:hover{border-color:var(--green-l);color:var(--green-l);background:var(--glow)}

  .foot{font-size:11px;color:var(--muted);text-align:center;letter-spacing:1px;animation:up .5s .62s ease both}
  .foot span{color:var(--green-l)}

  @keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:480px){.wrap{padding:44px 18px 60px}}
</style>
</head>
<body>
<div class="wrap">

  <div class="logo-box">

      <polygon points="4,8 16,8 26,32 36,8 48,8 26,46" fill="#ffffff"/>
      <polygon points="12,8 20,8 26,20 32,8 40,8 26,38" fill="#1a1a1a"/>
      <polygon points="22,6 28,6 26,12" fill="#1a6b45"/>
      <!-- geometric cuts matching logo style -->
      <rect x="21" y="8" width="3" height="8" fill="#1a6b45" opacity="0.7"/>
    </svg>
  </div>

  <div class="brand">VIDI<span>IENT</span></div>
  <div class="tagline">Content that sells. Powered by AI.</div>
  <div class="loc">📍 Karachi, Pakistan</div>
  <div class="div"></div>

  <div class="links">

    <a href="https://drive.google.com/drive/folders/1VQQSQysTil324kVYQmswCHqYNR5Dr47r?usp=drive_link" class="lnk" target="_blank" rel="noopener">
      <div class="ico">▶</div>
      <div class="lt">
        <div class="lt-h">Watch our work</div>
        <div class="lt-s">Real estate edits & reels</div>
      </div>
      <div class="arr">→</div>
    </a>

    <a href="https://wa.me/923701081188?text=Hi%20Vidiient%2C%20I%27m%20interested%20in%20your%20content%20services" class="lnk" target="_blank" rel="noopener">
      <div class="ico">💬</div>
      <div class="lt">
        <div class="lt-h">WhatsApp us now</div>
        <div class="lt-s">Usually replies within 1 hour</div>
      </div>
      <div class="arr">→</div>
    </a>

    <a href="https://instagram.com/vidiient" class="lnk" target="_blank" rel="noopener">
      <div class="ico">📸</div>
      <div class="lt">
        <div class="lt-h">Follow on Instagram</div>
        <div class="lt-s">@vidiient</div>
      </div>
      <div class="arr">→</div>
    </a>

    <a href="mailto:anas.vidiient@gmail.com" class="lnk">
      <div class="ico">✉</div>
      <div class="lt">
        <div class="lt-h">Email us</div>
        <div class="lt-s">anas.vidiient@gmail.com</div>
      </div>
      <div class="arr">→</div>
    </a>

  </div>

  <div class="socials">
    <a href="https://instagram.com/vidiient" class="sb" title="Instagram" target="_blank">📸</a>
    <a href="#" class="sb" title="YouTube">▶</a>
    <a href="#" class="sb" title="TikTok">🎵</a>
  </div>

  <div class="foot">© 2025 <span>VIDIIENT</span> · All rights reserved</div>

</div>
</body>
</html>
